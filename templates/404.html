<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Not Found — SuqMasr</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#F2F2F7;--card:#fff;--fill:rgba(120,120,128,.12);
      --text:#000;--text2:rgba(60,60,67,.6);--sep:rgba(60,60,67,.12);
      --blue:#007AFF;--shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.04);
      --r:12px;--r-sm:8px;--font:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#000;--card:#1C1C1E;--fill:rgba(118,118,128,.24);--text:#fff;--text2:rgba(235,235,245,.6);--sep:rgba(84,84,88,.6);--shadow:0 1px 3px rgba(0,0,0,.4),0 0 0 .5px rgba(255,255,255,.05)}
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    a.logo{font-size:1.05rem;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:-.3px;margin-bottom:48px;display:block}
    .icon{font-size:3.5rem;margin-bottom:14px;opacity:.5}
    h1{font-size:1.25rem;font-weight:700;letter-spacing:-.2px;margin-bottom:8px}
    p{font-size:.88rem;color:var(--text2);margin-bottom:28px;max-width:260px}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:11px 20px;border-radius:var(--r-sm);font-size:.9rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;background:var(--blue);color:#fff;font-family:var(--font)}
    .btn:hover{opacity:.88}
  </style>
</head>
<body>
  <a class="logo" href="/">SuqMasr</a>
  <div class="icon">🔍</div>
  <h1>Listing not found</h1>
  <p>This listing may have been sold, removed, or the link is incorrect.</p>
  <a class="btn" href="/">← Back to listings</a>
</body>
</html>
